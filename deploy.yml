name: Install Xray on VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Xray
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          
          CFG='{"log":{"loglevel":"warning"},"inbounds":[{"listen":"0.0.0.0","port":443,"protocol":"vless","settings":{"clients":[{"id":"85925f10-6fc4-4baa-a28e-37ea53113f1b","flow":"xtls-rprx-vision"}],"decryption":"none"},"streamSettings":{"network":"tcp","security":"reality","realitySettings":{"dest":"www.microsoft.com:443","serverNames":["www.microsoft.com"],"privateKey":"iIqq9K77zHIyq-tnDeHQAW-NjOMkMgMQNPMSU4PLXWQ","shortIds":["a1b2c3d4"]}}}],"outbounds":[{"protocol":"freedom","tag":"direct"}]}'
          
          sshpass -p "${{ secrets.VPS_PASS }}" ssh -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} "
            hostname
            cd /tmp
            wget -q -O xray.zip https://github.com/XTLS/Xray-core/releases/download/v26.3.27/Xray-linux-64.zip
            unzip -o -q xray.zip xray geoip.dat geosite.dat
            chmod +x xray
            echo '$CFG' > config.json
            pkill xray 2>/dev/null; true
            nohup ./xray run -config config.json > /var/log/xray.log 2>&1 &
            sleep 2
            ps aux | grep '[x]ray'
            echo DONE
          "
