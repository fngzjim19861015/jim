name: Diag

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - run: |
          sudo apt install -y -qq sshpass
          sshpass -p "${{ secrets.VPS_PASS }}" ssh -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} '
          echo "=== XRAY ==="
          ps aux | grep "[x]ray" || echo "NOT RUNNING"
          echo "=== PORT ==="
          ss -tlnp | grep 443 || echo "NO 443"
          echo "=== FW ==="
          iptables -L INPUT -n 2>/dev/null || echo "no iptables"
          echo "=== UFW ==="
          ufw status 2>/dev/null || echo "no ufw"
          echo "=== LOG ==="
          tail -10 /tmp/x.log 2>/dev/null || echo "no log"
          echo "=== CURL TEST ==="
          curl -sk -o /dev/null -w "%{http_code}" --connect-timeout 3 https://127.0.0.1:443 2>/dev/null || echo "no response"
          '
