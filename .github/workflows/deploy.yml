name: Install Xray

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: |
          sudo apt install -y -qq sshpass
          sshpass -p "${{ secrets.VPS_PASS }}" ssh -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} '
          echo "=== Xray Process ==="
          ps aux | grep "[x]ray" || echo "NOT RUNNING"
          echo "=== Port 443 ==="
          ss -tlnp | grep 443 || echo "NOT LISTENING"
          echo "=== Firewall ==="
          iptables -L INPUT -n 2>/dev/null | head -10
          echo "=== UFW ==="
          ufw status 2>/dev/null || echo "no ufw"
          echo "=== Log ==="
          tail -5 /tmp/x.log 2>/dev/null || tail -5 /var/log/xray.log 2>/dev/null || echo "no log"
          '
